<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Discord Clone MVP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
}

#app { display:none; }

.container {
  display:flex;
  height:100vh;
}

.sidebar {
  width:260px;
  background:#1a1a1a;
  padding:10px;
  overflow:auto;
}

.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  overflow:auto;
  padding:10px;
}

.input {
  display:flex;
}

input, button {
  padding:8px;
  margin:4px;
}

.msg {
  background:#2a2a2a;
  padding:5px;
  margin:5px 0;
}

.admin {
  background:#3a1a1a;
}

.small {
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <h2>Login / Register</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<!-- APP -->
<div id="app">

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div>
        Logged in: <span id="me"></span>
        <button onclick="logout()">Logout</button>
      </div>

      <hr>

      <input id="search" placeholder="Search users" oninput="loadUsers()">

      <div id="users"></div>

      <hr>

      <div id="groups"></div>

      <button onclick="createGroup()">+ Group</button>

      <hr>

      <div id="adminPanel"></div>

    </div>

    <!-- CHAT -->
    <div class="chat">

      <div class="messages" id="messages"></div>

      <div class="input">
        <input id="msg" placeholder="message">
        <button onclick="send()">Send</button>
      </div>

    </div>

  </div>

</div>

<script>
const supabase = supabase.createClient(
  "SUPABASE_URL",
  "SUPABASE_ANON_KEY"
);

let me = null;
let activeUser = null;
let activeGroup = null;

/* ================= AUTH ================= */

async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });
  if (!error) init();
}

async function register() {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });
  if (error) alert(error.message);
  else alert("Registered");
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

/* ================= INIT ================= */

async function init() {
  const { data } = await supabase.auth.getUser();
  me = data.user;

  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("me").innerText = me.email;

  loadUsers();
  loadAdmin();
  subscribe();
}

/* ================= USERS ================= */

async function loadUsers() {
  let q = search.value || "";

  let { data } = await supabase
    .from("profiles")
    .select("*");

  let html = "";

  data
    .filter(u => u.username?.includes(q) || u.id.includes(q))
    .forEach(u => {
      if (u.id === me.id) return;

      html += `
        <div onclick="openDM('${u.id}')">
          👤 ${u.username || u.id}
        </div>
      `;
    });

  users.innerHTML = html;
}

/* ================= DM ================= */

function openDM(id) {
  activeUser = id;
  activeGroup = null;
  loadMessages();
}

/* ================= GROUP ================= */

async function createGroup() {
  const name = prompt("Group name");

  await supabase.from("groups").insert({
    name,
    created_by: me.id
  });

  loadGroups();
}

async function loadGroups() {
  let { data } = await supabase.from("groups").select("*");

  groups.innerHTML = data.map(g =>
    `<div onclick="openGroup('${g.id}')"># ${g.name}</div>`
  ).join("");
}

function openGroup(id) {
  activeGroup = id;
  activeUser = null;
  loadMessages();
}

/* ================= MESSAGES ================= */

async function send() {
  if (!msg.value) return;

  await supabase.from("messages").insert({
    sender_id: me.id,
    receiver_id: activeUser,
    group_id: activeGroup,
    content: msg.value
  });

  msg.value = "";
}

/* realtime load */
async function loadMessages() {
  let query = supabase.from("messages").select("*");

  if (activeUser) {
    query = query.or(
      `and(sender_id.eq.${me.id},receiver_id.eq.${activeUser}),and(sender_id.eq.${activeUser},receiver_id.eq.${me.id})`
    );
  }

  if (activeGroup) {
    query = query.eq("group_id", activeGroup);
  }

  let { data } = await query.order("created_at");

  messages.innerHTML = data.map(m => `
    <div class="msg ${isAdminView(m) ? 'admin' : ''}">
      <div class="small">${m.sender_id}</div>
      ${m.content}
    </div>
  `).join("");
}

/* ================= ADMIN ================= */

async function loadAdmin() {
  let { data } = await supabase.from("profiles").select("*");

  let meData = data.find(u => u.id === me.id);

  if (meData?.role === "admin") {
    adminPanel.innerHTML = "<h3>ADMIN MODE</h3><button onclick='loadAllMessages()'>All messages</button>";
  }
}

async function loadAllMessages() {
  let { data } = await supabase.from("messages").select("*");

  messages.innerHTML = data.map(m =>
    `<div class="msg admin">${m.content}</div>`
  ).join("");
}

/* ================= REALTIME ================= */

function subscribe() {
  supabase
    .channel("messages")
    .on("postgres_changes", {
      event: "*",
      table: "messages"
    }, () => {
      loadMessages();
    })
    .subscribe();
}

/* ================= COPY BLOCK (UI ONLY) ================= */

document.addEventListener("copy", e => e.preventDefault());

function isAdminView(m) {
  return false;
}

/* boot */
init();
</script>

</body>
</html>
