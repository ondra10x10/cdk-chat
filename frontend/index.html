<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CDK Chat</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
}

.login, .chat {
  display: none;
  padding: 20px;
}

.chatBox {
  height: 80vh;
  overflow-y: auto;
  background: #1c1c1c;
  padding: 10px;
}

.msg {
  background: #2a2a2a;
  margin: 5px;
  padding: 8px;
  border-radius: 8px;
}

input, button {
  padding: 10px;
}
</style>
</head>

<body>

<div class="login" id="login">
  <h2>Přihlášení</h2>
  <input id="u" placeholder="uživatel">
  <input id="p" type="password" placeholder="heslo">
  <button onclick="login()">Login</button>
</div>

<div class="chat" id="chat">
  <h3>Chat</h3>

  <div class="chatBox" id="box"></div>

  <input id="msg">
  <button onclick="send()">Odeslat</button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
let socket;

document.getElementById("login").style.display = "block";

/* LOGIN */
async function login() {
  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: u.value,
      password: p.value
    })
  });

  const data = await res.json();

  socket = io("http://localhost:3000", {
    auth: { token: data.token }
  });

  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "block";

  socket.on("messages", renderAll);
  socket.on("message", renderOne);
}

/* ODESLÁNÍ */
function send() {
  socket.emit("send", msg.value);
  msg.value = "";
}

/* RENDER */
function renderAll(data) {
  box.innerHTML = "";
  data.forEach(renderOne);
}

function renderOne(m) {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `
    <b>${m.user}</b>: ${m.text}
    <button onclick="del(${m.id})">x</button>
  `;
  box.appendChild(div);
}

/* ADMIN DELETE */
function del(id) {
  socket.emit("delete", id);
}
</script>

</body>
</html>
